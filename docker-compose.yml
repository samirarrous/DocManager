version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: docmanager-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  python-analyzer:
    build:
      context: ./Analyse-de-documents-comptables
    container_name: docmanager-analyzer
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: docmanager-backend
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/appdb
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - PYTHON_ANALYZER_URL=http://python-analyzer:8000/upload
      - ZAMMAD_API_URL=http://host.docker.internal:8080/api/v1
      - ZAMMAD_API_TOKEN=j_zviFnJlO1x-yqLdeSi4gf7vzh-VaktLVgS_qOdK22CCNkHY0oSC74Tk8Zr5hcJ
    depends_on:
      - postgres
      - python-analyzer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: docmanager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
